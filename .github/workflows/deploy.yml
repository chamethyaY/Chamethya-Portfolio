name: Deploy Portfolio

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run compilation build
        run: npm run build

      - name: Setup GitHub Pages configuration
        uses: actions/configure-pages@v4

      - name: Upload compiled assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy compilation to live site
        id: deployment
        uses: actions/deploy-pages@v4
